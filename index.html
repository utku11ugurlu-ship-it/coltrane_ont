<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>John Coltrane - Semantik Arşiv</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #f5f5f5; --accent: #d4af37; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        header { text-align: center; border-bottom: 2px solid var(--accent); margin-bottom: 30px; }
        h1 { color: var(--accent); }
        .controls { display: flex; justify-content: space-between; max-width: 1000px; margin: 0 auto 30px; }
        .search-box { padding: 10px; border-radius: 5px; border: none; background: #2c2c2c; color: white; width: 300px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 10px; border-left: 4px solid var(--accent); cursor: pointer; }
        #detay-paneli { display: none; max-width: 1000px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 10px; border-top: 4px solid var(--accent); }
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>JOHN COLTRANE ARŞİVİ</h1>
        <p>BBY464 - Semantik Web Projesi</p>
    </header>

    <div class="controls" id="kontroller">
    <input type="text" id="arama" class="search-box" placeholder="Albüm ara..." onkeyup="filtrele()">
    <div>
        <a href="albumler.xml" download class="download-btn" style="color:var(--accent); margin-right: 10px;">XML: Albümler</a>
        <a href="muzisyenler.xml" download class="download-btn" style="color:var(--accent); margin-right: 10px;">XML: Müzisyenler</a>
        <a href="parcalar.xml" download class="download-btn" style="color:var(--accent)">XML: Parçalar</a>
    </div>
</div>

    <div id="album-sahnesi" class="grid">Veriler yükleniyor...</div>

    <div id="detay-paneli">
        <button class="back-btn" onclick="anaSayfayaDon()">← Geri Dön</button>
        <h2 id="detay-baslik"></h2>
        <ul id="detay-parcalar" style="list-style:none; padding:0;"></ul>
    </div>

    <script>
        let tumAlbumler = [];
        let tumParcalar = [];

        async function verileriYukle() {
            try {
                const [resA, resP] = await Promise.all([fetch('albumler.xml'), fetch('parcalar.xml')]);
                const parser = new DOMParser();
                const xmlA = parser.parseFromString(await resA.text(), "text/xml");
                const xmlP = parser.parseFromString(await resP.text(), "text/xml");

                tumAlbumler = Array.from(xmlA.getElementsByTagName("Album")).map(n => ({
                    id: n.getAttribute("id"),
                    baslik: n.getElementsByTagName("Baslik")[0].textContent,
                    yil: n.getElementsByTagName("Yil")[0].textContent,
                    sirket: n.getElementsByTagName("PlakSirketi")[0].textContent
                }));

                tumParcalar = Array.from(xmlP.getElementsByTagName("Parca")).map(n => ({
                    albumRef: n.getAttribute("albumRef"),
                    isim: n.getElementsByTagName("Isim")[0].textContent,
                    sure: n.getElementsByTagName("Sure")[0].textContent,
                    personel: n.getElementsByTagName("Personel")[0]?.textContent || "Bilgi Yok"
                }));
                ekranaBas(tumAlbumler);
            } catch (e) { console.error("Hata:", e); }
        }

        function ekranaBas(liste) {
            const sahne = document.getElementById("album-sahnesi");
            sahne.innerHTML = "";
            liste.forEach(a => {
                const div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `<h2>${a.baslik}</h2><p>${a.yil} - ${a.sirket}</p>`;
                div.onclick = () => detayGoster(a);
                sahne.appendChild(div);
            });
        }

        function detayGoster(album) {
            document.getElementById("album-sahnesi").style.display = "none";
            document.getElementById("kontroller").style.display = "none";
            document.getElementById("detay-paneli").style.display = "block";
            document.getElementById("detay-baslik").textContent = album.baslik;

            const parcalar = tumParcalar.filter(p => p.albumRef === album.id);
            const liste = document.getElementById("detay-parcalar");
            liste.innerHTML = "";
            parcalar.forEach(p => {
                liste.innerHTML += `<li style="margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">
                    <strong>${p.isim}</strong> (${p.sure})<br>
                    <small style="color:#aaa;">Kadro: ${p.personel}</small></li>`;
            });
        }

        function anaSayfayaDon() {
            document.getElementById("detay-paneli").style.display = "none";
            document.getElementById("album-sahnesi").style.display = "grid";
            document.getElementById("kontroller").style.display = "flex";
        }

        function filtrele() {
            const ara = document.getElementById("arama").value.toLowerCase();
            ekranaBas(tumAlbumler.filter(a => a.baslik.toLowerCase().includes(ara)));
        }

        verileriYukle();
    </script>
</body>
</html>
